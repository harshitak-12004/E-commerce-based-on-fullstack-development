<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Beauty Shop</title>
<style>
body{ font-family:Arial; margin:0; padding:0; background:#f7f7f7;}
header{ background:black; color:white; padding:15px; text-align:center; font-size:24px;}
.container{ max-width:1000px; margin:20px auto; background:white; padding:20px; border-radius:10px;}
table{ width:100%; border-collapse: collapse;}
table th, table td{ padding:10px; text-align:center; border-bottom:1px solid #ddd;}
table img{ width:80px; height:80px; object-fit:cover; border-radius:5px;}
.quantity-btn{ padding:3px 8px; margin:0 5px; background:#ff4d6d; color:white; border:none; border-radius:3px; cursor:pointer;}
.order-summary{ margin-top:20px; text-align:right;}
.order-summary h3{ margin:5px 0;}
button.place-order{ background:#ff4d6d; color:white; border:none; padding:10px 20px; cursor:pointer; border-radius:5px; margin-top:10px;}
</style>
</head>
<body>

<header>Shopping Cart</header>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Subtotal</th>
        <th>Remove</th>
      </tr>
    </thead>
    <tbody id="cartBody"></tbody>
  </table>

  <div class="order-summary">
    <h3 id="totalItems">Items: 0</h3>
    <h3 id="subTotal">Subtotal: $0</h3>
    <button class="place-order" onclick="placeOrder()">Place Order</button>
  </div>
</div>

<script>
// LOGIN CHECK
if(localStorage.getItem("isLoggedIn") !== "true"){
    alert("⚠ Please login first!");
    window.location.href = "index.html";
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){
    const tbody = document.getElementById("cartBody");
    tbody.innerHTML = "";
    let total=0, totalQty=0;

    cart.forEach((item,index)=>{
        let subtotal = item.price * item.quantity;
        total += subtotal;
        totalQty += item.quantity;

        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td><img src="${item.image}"><br>${item.name}</td>
            <td>$${item.price}</td>
            <td>
                <button class="quantity-btn" onclick="changeQty(${index},-1)">-</button>
                ${item.quantity}
                <button class="quantity-btn" onclick="changeQty(${index},1)">+</button>
            </td>
            <td>$${subtotal}</td>
            <td><button onclick="removeItem(${index})">X</button></td>
        `;
        tbody.appendChild(tr);
    });

    document.getElementById("totalItems").innerText = `Items: ${totalQty}`;
    document.getElementById("subTotal").innerText = `Subtotal: $${total}`;
}

function changeQty(index,delta){
    cart[index].quantity += delta;
    if(cart[index].quantity<1) cart[index].quantity=1;
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function placeOrder(){
    if(cart.length===0){ alert("Cart is empty!"); return; }
    alert("🎉 Order Successfully Placed!");
    localStorage.removeItem("cart");
    cart=[];
    renderCart();
}

// initial render
renderCart();
</script>

</body>
</html>
